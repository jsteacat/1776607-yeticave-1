services:
  nginx:
    image: nginx:stable-alpine
    container_name: yeticave_nginx
    ports:
      - "80:80"
    volumes:
      - ./www:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - yeticave_net

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: yeticave_php
    env_file: .env
    volumes:
      - ./www:/var/www/html
    networks:
      - yeticave_net

  mysql:
    image: mysql:8.0
    container_name: yeticave_mysql
    restart: unless-stopped
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - yeticave_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: yeticave_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file: .env
    depends_on:
      - mysql
    networks:
      - yeticave_net

volumes:
  mysql_data:

networks:
  yeticave_net:
    driver: bridge
